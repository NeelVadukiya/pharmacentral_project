<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – PharmaCentral</title>
{% load static %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260319">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">💊 PharmaCentral</div>
    <p style="font-size:0.82rem;color:#888;margin-bottom:20px">Medicine Inventory Management — Please log in to continue.</p>

    {% if error %}
    <div class="flash-msg error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      {% if request.GET.next %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      {% endif %}

      <div class="form-group" style="margin-bottom:14px">
        <label>Username</label>
        <input type="text" name="username" class="form-control" value="{{ username|default:'' }}" autofocus required placeholder="Enter your username">
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Enter your password">
      </div>

      <button type="submit" class="btn btn-green" style="width:100%;padding:10px">Login →</button>
    </form>

    <p style="margin-top:18px;font-size:0.76rem;color:#aaa;text-align:center">
      Contact your administrator if you don't have an account.
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
